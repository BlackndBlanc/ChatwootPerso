version: '3'

x-base: &base
  image: ghcr.io/blackndblanc/chatwootperso:latest
  env_file: .env
  volumes:
    - storage_data:/app/storage
  environment:
    - POSTGRES_DATABASE=${POSTGRES_DATABASE:-${POSTGRES_DB:-chatwoot}}
    - POSTGRES_USERNAME=${POSTGRES_USERNAME:-${POSTGRES_USER:-postgres}}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    - POSTGRES_HOST=${POSTGRES_HOST:-postgres}

services:

  rails:
    <<: *base
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - RAILS_ENV=${RAILS_ENV:-production}
      - INSTALLATION_ENV=${INSTALLATION_ENV:-docker}
    entrypoint: ["sh", "docker/entrypoints/rails.sh"]
    command: ['sh', '-c', 'bundle exec rake db:chatwoot_prepare && bundle exec rails s -p 3000 -b 0.0.0.0']
    restart: always
    networks:
      - coolify

  sidekiq:
    <<: *base
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - RAILS_ENV=${RAILS_ENV:-production}
      - INSTALLATION_ENV=${INSTALLATION_ENV:-docker}
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    restart: always
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  storage_data:
